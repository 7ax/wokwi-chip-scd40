<svg xmlns="http://www.w3.org/2000/svg" width="80" height="100" viewBox="0 0 80 100">
  <!-- PCB substrate -->
  <rect x="5" y="5" width="70" height="90" rx="3" fill="#009688" stroke="#00695C" stroke-width="1"/>

  <!-- Mounting holes -->
  <circle cx="12" cy="12" r="2" fill="none" stroke="#00695C" stroke-width="0.5"/>
  <circle cx="68" cy="12" r="2" fill="none" stroke="#00695C" stroke-width="0.5"/>

  <!-- SCD40 sensor module -->
  <rect x="18" y="22" width="44" height="30" rx="2" fill="#333" stroke="#555" stroke-width="0.5"/>

  <!-- Photoacoustic sensor aperture -->
  <circle cx="40" cy="37" r="8" fill="#222" stroke="#444" stroke-width="0.5"/>
  <circle cx="40" cy="37" r="4" fill="#1a1a1a"/>

  <!-- Silkscreen -->
  <text x="40" y="62" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="bold">SCD40</text>
  <text x="40" y="72" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="monospace" font-size="5">CO2 / T / RH</text>

  <!-- Pin pads -->
  <rect x="10" y="82" width="10" height="12" rx="1" fill="#C0C0C0" stroke="#808080" stroke-width="0.5"/>
  <rect x="25" y="82" width="10" height="12" rx="1" fill="#C0C0C0" stroke="#808080" stroke-width="0.5"/>
  <rect x="45" y="82" width="10" height="12" rx="1" fill="#C0C0C0" stroke="#808080" stroke-width="0.5"/>
  <rect x="60" y="82" width="10" height="12" rx="1" fill="#C0C0C0" stroke="#808080" stroke-width="0.5"/>

  <!-- Pin labels -->
  <text x="15" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="5">VCC</text>
  <text x="30" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="5">GND</text>
  <text x="50" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="5">SDA</text>
  <text x="65" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="5">SCL</text>

  <!-- Attribution -->
  <text x="40" y="16" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="4">@7ax</text>
</svg>
